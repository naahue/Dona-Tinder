{% extends "usuarios/base_modificar.html" %}
{% block title %}Modificar Datos{% endblock %}
{% block inner %}
<form method="POST">
    {% csrf_token %}
    <h1>Modificar Datos</h1>
    <br>
    {{ form.first_name }}
    {{ form.last_name }}
    {% include 'usuarios/includes/form_field_errors.html' %}
    <br>
    <button type="submit">Modificar</button>
    <br>
    <a class="btn" href="{% url 'donacion:ingresarDonacion' %}" role="button">Volver</a>
</form>
{% endblock %}
