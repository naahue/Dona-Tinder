{% load static %}
<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'usuarios/theme.css' %}">
    <title>Contraseña actualizada</title>
    <style>
        .dt-pass-wrap { max-width: 440px; margin: 3rem auto; padding: 2rem; text-align: center; }
        .dt-pass-wrap h1 { font-size: 1.35rem; margin-bottom: 1rem; color: var(--dt-text); }
        .dt-pass-wrap p { color: var(--dt-text-soft); font-size: 0.95rem; line-height: 1.55; margin-bottom: 1.25rem; }
        .dt-pass-wrap a.btn-wrap { display: inline-block; margin-top: 0.5rem; }
    </style>
</head>
<body class="dt-body">
    <div class="dt-form-panel dt-pass-wrap">
        <h1>Listo</h1>
        <p>Tu contraseña se actualizó correctamente. Ya podés iniciar sesión con la nueva clave.</p>
        <p><a class="btn dt-btn-submit btn-wrap" href="{% url 'usuarios:inicioSesion' %}">Iniciar sesión</a></p>
    </div>
</body>
</html>
